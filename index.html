<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kepty Dashboard - Learning Stats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --kepty-orange: #CE4A22;
            --kepty-mid-orange: #FAC3B1;
            --kepty-light-orange: #FFEDE8;
            --kepty-dark: #2A0B02;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: radial-gradient(circle at 50% 50%, #FF6B3D 0%, #CE4A22 45%, #2A0B02 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
            margin: 0;
        }
        .dashboard-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 24px;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 240px;
        }
        .text-sharp {
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
        
        <div class="flex flex-col">
            <div class="flex items-center gap-2 mb-6">
                <div class="w-2 h-6 bg-white rounded-full"></div>
                <h2 class="text-lg font-semibold tracking-tight">今週の学習時間</h2>
            </div>
            <div class="chart-container flex items-center justify-center">
                <canvas id="circleChart"></canvas>
            </div>
        </div>

        <div class="flex flex-col">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-6 bg-[#FAC3B1] rounded-full"></div>
                    <h2 class="text-lg font-semibold tracking-tight">今週の日時進捗</h2>
                </div>
                <button class="bg-white/10 hover:bg-white/20 px-4 py-1.5 rounded-full text-xs font-bold border border-white/20 transition">変更</button>
            </div>
            
            <div class="flex gap-6 mb-4 text-sharp">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold opacity-60 uppercase tracking-widest mb-0.5">今週の目標</span>
                    <div class="flex items-baseline">
                        <span class="text-xl font-bold">03</span>
                        <span class="text-[10px] font-medium opacity-60 ml-0.5 mr-1.5">時間</span>
                        <span class="text-xl font-bold">30</span>
                        <span class="text-[10px] font-medium opacity-60 ml-0.5">分</span>
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold opacity-60 uppercase tracking-widest mb-0.5">今週の総学習時間</span>
                    <div class="flex items-baseline text-[#FAC3B1]">
                        <span class="text-xl font-bold">03</span>
                        <span class="text-[10px] font-medium opacity-80 ml-0.5 mr-1.5">時間</span>
                        <span class="text-xl font-bold">19</span>
                        <span class="text-[10px] font-medium opacity-80 ml-0.5">分</span>
                    </div>
                </div>
            </div>

            <div class="relative h-[180px] w-full bg-white/5 rounded-2xl p-4">
                <div class="absolute right-2 top-2 text-[10px] font-bold opacity-50">(分)</div>
                <canvas id="barChart"></canvas>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-5">
        <div class="glass-card flex flex-col justify-between">
            <div class="flex items-center gap-2 opacity-70 mb-4">
                <i data-lucide="clock" class="w-4 h-4"></i>
                <span class="text-xs font-bold uppercase tracking-widest">総学習時間</span>
            </div>
            <div class="flex items-baseline justify-end gap-1 text-sharp">
                <span class="text-3xl font-bold">300</span>
                <span class="text-sm font-medium opacity-70">時間</span>
            </div>
            <p class="text-[9px] font-bold opacity-40 text-right mt-2">サプリ内：300時間</p>
        </div>

        <div class="glass-card flex flex-col justify-between border-t-2 border-t-[#FAC3B1]">
            <div class="flex items-center gap-2 opacity-70 mb-4">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                <span class="text-xs font-bold uppercase tracking-widest">総学習回数</span>
            </div>
            <div class="flex items-baseline justify-end gap-1 text-sharp">
                <span class="text-3xl font-bold">6,129</span>
                <span class="text-sm font-medium opacity-70">回</span>
            </div>
        </div>

        <div class="glass-card flex flex-col justify-between">
            <div class="flex items-center gap-2 opacity-70 mb-4">
                <i data-lucide="calendar" class="w-4 h-4"></i>
                <span class="text-xs font-bold uppercase tracking-widest">連続学習日数</span>
            </div>
            <div class="flex items-baseline justify-end gap-1 text-sharp">
                <span class="text-3xl font-bold">445</span>
                <span class="text-sm font-medium opacity-70">日</span>
            </div>
            <p class="text-[9px] font-bold opacity-40 text-right mt-2">自己ベスト：445日</p>
        </div>
    </div>
</div>

<script>
    lucide.createIcons();

    // --- 円形グラフ ---
    const ctxCircle = document.getElementById('circleChart').getContext('2d');
    
    const centerTextPlugin = {
        id: 'centerText',
        afterDraw: (chart) => {
            const { ctx, chartArea: { width, height } } = chart;
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 「日」を削除し、垂直方向のど真ん中に配置
            const centerY = height / 2;
            
            ctx.font = '700 42px Inter';
            ctx.fillStyle = 'white';
            ctx.fillText('03', width / 2 - 28, centerY - 5);
            ctx.fillText('19', width / 2 + 32, centerY - 5);
            
            ctx.font = '600 12px Inter';
            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.fillText('時間', width / 2 - 28, centerY + 27);
            ctx.fillText('分', width / 2 + 32, centerY + 27);
            
            ctx.restore();
        }
    };

    new Chart(ctxCircle, {
        type: 'doughnut',
        data: {
            datasets: [{
                data: [75, 25],
                backgroundColor: ['white', 'rgba(255,255,255,0.1)'],
                borderWidth: 0,
                borderRadius: 20,
                cutout: '90%'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false }, tooltip: { enabled: false } }
        },
        plugins: [centerTextPlugin]
    });

    // --- ゲージ式棒グラフ ---
    const ctxBar = document.getElementById('barChart').getContext('2d');
    
    const actualData = [40, 30, 60, 55, 45, 20, 10];
    const targetData = [60, 60, 60, 60, 60, 60, 60];

    new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: ['月', '火', '水', '木', '金', '土', '日'],
            datasets: [
                {
                    label: '実績',
                    data: actualData,
                    backgroundColor: 'white',
                    borderRadius: 10,
                    barThickness: 8,
                    order: 1
                },
                {
                    label: '目標',
                    data: targetData,
                    backgroundColor: 'rgba(255, 255, 255, 0.15)',
                    borderRadius: 10,
                    barThickness: 8,
                    order: 2,
                    grouped: false
                }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { display: false, max: 75 }, // 数字を表示するために少し高さを確保
                x: {
                    grid: { display: false },
                    ticks: { color: 'rgba(255,255,255,0.6)', font: { size: 11, weight: '600' } },
                    border: { display: false }
                }
            },
            plugins: {
                legend: { display: false },
                tooltip: { enabled: false }
            }
        },
        plugins: [{
            id: 'barTopLabel',
            afterDatasetsDraw: (chart) => {
                const { ctx } = chart;
                ctx.save();
                ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(255,255,255,0.4)';
                ctx.font = 'bold 10px Inter';
                
                // 目標バー（dataset index 1）の上に "60" を表示
                const meta = chart.getDatasetMeta(1);
                meta.data.forEach((bar, index) => {
                    ctx.fillText('60', bar.x, bar.y - 8);
                });
                ctx.restore();
            }
        }]
    });
</script>

</body>
</html>
