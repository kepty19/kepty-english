<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kepty English Portal</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', -apple-system, sans-serif; -webkit-overflow-scrolling: touch; background-color: #f8fafc; }
:root { 
    --kepty-orange: #CE4A22; --kepty-light-orange: #FFEDE8; --kepty-mid-orange: #FAC3B1; --kepty-green: #10b981; --kepty-light-green: #ecfdf5;
    --hl-blue: #bfdbfe; --hl-pink: #fbcfe8; --hl-green-soft: #bbf7d0; --hl-yellow: #fef08a; 
}
.bg-kepty-orange { background-color: var(--kepty-orange) !important; }
.text-kepty-orange { color: var(--kepty-orange) !important; }

/* ウェルカム画面 */
#welcome-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #FF6B3D 0%, #CE4A22 45%, #2A0B02 100%); z-index: 2000; transition: opacity 0.6s ease-out; display: flex; align-items: center; justify-content: center; }
#welcome-message { color: #ffffff; font-size: 32px; font-weight: 900; letter-spacing: -0.02em; text-align: center; padding: 20px; white-space: pre-line; opacity: 0; transition: opacity 0.4s ease-in; }

/* 共通UI部品 */
.mode-switch-wrapper { padding-bottom: 16px; border-bottom: 1px solid #f1f5f9; margin-bottom: 16px; }
.mode-switch-container { background-color: #f1f5f9; border-radius: 10px; padding: 2px; display: flex; position: relative; width: 100%; height: 34px; }
.mode-switch-btn { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 400; z-index: 10; transition: color 0.25s; color: #94a3b8; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.mode-switch-btn.active { color: var(--kepty-orange); font-weight: 700; }
.mode-slider { position: absolute; top: 2px; left: 2px; height: calc(100% - 4px); background-color: white; border-radius: 8px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 2px 6px rgba(0,0,0,0.06); z-index: 1; }

.category-tab { transition: all 0.2s; white-space: nowrap; flex-shrink: 0; font-weight: 600; height: 32px; display: flex; align-items: center; justify-content: center; padding: 0 16px; min-width: 60px; font-size: 11px; border-radius: 9999px; border: 1px solid #f1f5f9; background: white; color: #94a3b8; cursor: pointer; }
.category-tab.active { background-color: var(--kepty-orange) !important; color: white !important; font-weight: 700; border-color: var(--kepty-orange); }

.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

.theme-scroll-container { display: flex; overflow-x: auto; gap: 20px; padding: 0 4px 8px 4px; scrollbar-width: none; border-bottom: 1px solid #f1f5f9; }
.theme-item { padding: 8px 0; border-bottom: 3px solid transparent; font-size: 13px; font-weight: 400; color: #94a3b8; cursor: pointer; flex-shrink: 0; }
.theme-item.active { color: #1e293b; font-weight: 700; border-bottom-color: var(--kepty-orange); }

.video-wrapper { position: relative; width: 100%; padding-top: 56.25%; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 16px; }
.video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

/* カードデザイン */
.flip-card-chunk, .flip-card-voc { perspective: 1000px; min-height: 70px; cursor: pointer; margin-bottom: 8px; width: 100%; }
.flip-card-voc { min-height: 140px; }
.flip-card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
.flipped .flip-card-inner { transform: rotateY(180deg); }
.flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden; border-radius: 12px; padding: 12px 20px 12px 32px; display: flex; flex-direction: column; justify-content: center; text-align: left; }
.flip-card-front { background: white; border: 1px solid #f1f5f9; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
.flip-card-back { background: var(--kepty-light-green); border: 1px solid #d1fae5; transform: rotateY(180deg); }

/* クイズ判定アイコン */
.quiz-badge { position: absolute; top: 12px; right: 12px; width: 28px; height: 28px; border-radius: 50%; display: none; align-items: center; justify-content: center; color: white; z-index: 50; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
.quiz-badge.correct { background-color: #10b981; display: flex; }
.quiz-badge.incorrect { background-color: #ef4444; display: flex; }

.quiz-option-btn { position: relative; background: white; border: 2px solid #f1f5f9; transition: all 0.2s; text-align: left; padding: 16px; border-radius: 16px; font-weight: 700; font-size: 14px; width: 100%; display: block; -webkit-tap-highlight-color: transparent; }
.quiz-option-btn:active { transform: scale(0.98) translateY(2px); }

/* フッター */
.portal-footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #f1f5f9; display: flex; justify-content: flex-start; overflow-x: auto; padding: 12px 0; z-index: 100; box-shadow: 0 -5px 15px rgba(0,0,0,0.03); scrollbar-width: none; }
.footer-indicator { position: fixed; bottom: 22px; right: 0; z-index: 101; background: linear-gradient(to left, white 40%, transparent); color: var(--kepty-orange); width: 40px; height: 35px; display: flex; align-items: center; justify-content: center; animation: bounce-x 1.2s infinite; pointer-events: none; }
@keyframes bounce-x { 0%, 100% { transform: translateX(0); opacity: 0.5; } 50% { transform: translateX(-5px); opacity: 1; } }

.footer-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #94a3b8; cursor: pointer; transition: 0.2s; flex-shrink: 0; width: 75px; }
.footer-item.active { color: var(--kepty-orange); }
.footer-item span { font-size: 7.5px; font-weight: 700; transform: translateY(-1px); margin-top: 2px; }

/* 判定演出 */
.word-card { background: white; border-radius: 20px; border: 1px solid #f1f5f9; position: relative; overflow: hidden; transition: all 0.3s; width: 100%; text-align: left; }
.ph-card-content { transition: opacity 0.3s, filter 0.3s; }
.card-judging .ph-card-content { opacity: 0.1 !important; filter: blur(4px); }
.success-mode { background-color: #F0FDF4 !important; border: 1px solid #BBF7D0 !important; }
.good-label { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: 900; font-size: 2.2rem; opacity: 0; pointer-events: none; transition: all 0.3s; z-index: 50; color: #16a34a; }
.good-label.show { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }

/* マイク */
.record-btn { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid var(--kepty-orange); color: var(--kepty-orange); cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
.record-btn.recording { background-color: var(--kepty-orange) !important; color: white !important; animation: ph-pulse 1s infinite !important; }
@keyframes ph-pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(206, 74, 34, 0.1); } 100% { transform: scale(1); } }

.exam-mic-btn { width: 58px; height: 58px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid #e2e8f0; color: #94a3b8; background: #f8fafc; transition: 0.2s; cursor: pointer; position: relative; z-index: 20; }
.exam-mic-btn:active { transform: scale(0.9); background: #f1f5f9; }

.kepty-card { background: white; border-radius: 40px; padding: 24px 24px 40px 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); border: 1px solid #f1f5f9; min-height: 240px; display: flex; flex-direction: column; justify-content: center; text-align: center; position: relative; }
.voice-wave { display: flex; align-items: center; justify-content: center; gap: 4px; height: 30px; margin: 20px 0; }
.wave-bar { width: 3px; height: 5px; background: linear-gradient(to top, var(--kepty-orange), #FAC3B1); border-radius: 10px; animation: wave 1.2s infinite ease-in-out; }
.wave-bar:nth-child(2) { animation-delay: 0.1s; }
.wave-bar:nth-child(3) { animation-delay: 0.2s; }
.wave-bar:nth-child(4) { animation-delay: 0.15s; }
.wave-bar:nth-child(5) { animation-delay: 0.3s; }
@keyframes wave { 0%, 100% { height: 5px; } 50% { height: 25px; } }

.progress-dot { width: 10px; height: 10px; border-radius: 2px; border: 1.5px solid #e2e8f0; background: white; transition: 0.3s; }
.progress-dot.filled { background: var(--kepty-orange); border-color: var(--kepty-orange); }

.nav-icon-btn:active, .next-btn-orange:active { transform: scale(0.92) translateY(2px) !important; }
.next-btn-orange { background-color: var(--kepty-orange) !important; color: white !important; display: flex; align-items: center; justify-content: center; border-radius: 9999px; transition: transform 0.1s; cursor: pointer; position: relative; z-index: 20; }
.restart-link { color: #94a3b8; font-size: 14px; font-weight: 700; border-bottom: 2px solid var(--kepty-orange); padding-bottom: 2px; cursor: pointer; transition: all 0.1s; display: inline-block; }

#detail-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
.modal-content { background: white; border-radius: 24px; padding: 24px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

.card-inner-title { font-size: 13px; font-weight: 900; color: var(--kepty-orange) !important; margin-bottom: 12px; text-transform: uppercase; }
.sp-rule-box { background: #f1f5f9; border-radius: 12px; padding: 12px 16px; margin-bottom: 16px; text-align: left; }
.sp-rule-badge { background: #475569; color: white; font-size: 9px; font-weight: 900; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 8px; }
.sp-rule-text { color: #1e293b; font-size: 13px; font-weight: 700; line-height: 1.6; }
.review-item { text-align: left; padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 12px; }
.review-item .q { font-weight: 900; color: #1e293b; margin-bottom: 4px; }
.review-item .a { font-weight: 600; }
</style>
</head>
<body class="bg-slate-50 text-slate-900 pb-24 text-center">
<div id="welcome-overlay"><div id="welcome-message">Kepty English</div></div>
<div class="p-4 max-w-5xl mx-auto">
    <header class="flex items-center justify-between py-6 px-2"><h1 id="app-title" class="text-3xl font-[900] text-slate-900 tracking-tighter">Vocabulary</h1></header>
    <div class="mode-switch-wrapper" id="mode-wrapper"><div class="mode-switch-container" id="mode-switch-container"><div class="mode-slider" id="mode-slider"></div><div id="mode-buttons-area" class="flex w-full h-full"></div></div></div>
    <div id="category-container" class="flex overflow-x-auto gap-1 mb-1 no-scrollbar px-1"></div>
    <div id="theme-menu-container" class="mb-6 hidden"><div id="theme-scroll-list" class="theme-scroll-container"></div></div>
    <div id="ph-progress-area" class="hidden max-w-xl mx-auto mb-6 bg-transparent flex items-center justify-center"><div id="ph-progress-dots" class="flex justify-center gap-1.5 py-1"></div></div>
    <div id="main-content-area" class="mt-4"></div>
</div>
<div class="footer-indicator" id="footer-arrow"><i data-lucide="chevron-right" class="w-5 h-5"></i></div>
<footer class="portal-footer" id="main-footer">
    <div onclick="switchApp('vocabulary')" id="nav-vocabulary" class="footer-item active"><i data-lucide="graduation-cap"></i><span>Vocabulary</span></div>
    <div onclick="switchApp('pronunciation')" id="nav-pronunciation" class="footer-item"><i data-lucide="mic-2"></i><span>Pronunciation</span></div>
    <div onclick="switchApp('grammar')" id="nav-grammar" class="footer-item"><i data-lucide="book-open"></i><span>Grammar</span></div>
    <div onclick="switchApp('shadowing')" id="nav-shadowing" class="footer-item"><i data-lucide="headphones"></i><span>Shadowing</span></div>
    <div onclick="switchApp('reading')" id="nav-reading" class="footer-item"><i data-lucide="book-marked"></i><span>Reading</span></div>
    <div onclick="switchApp('topicTalk')" id="nav-topicTalk" class="footer-item"><i data-lucide="message-circle"></i><span>Topic Talk</span></div>
    <div onclick="switchApp('speaking')" id="nav-speaking" class="footer-item"><i data-lucide="message-square"></i><span>Speaking Form</span></div>
    <div onclick="switchApp('chunk')" id="nav-chunk" class="footer-item"><i data-lucide="layers"></i><span>Sentence Building</span></div>
</footer>
<div id="detail-modal" onclick="this.style.display='none'"><div class="modal-content" onclick="event.stopPropagation()"><div class="flex items-center"><div id="modal-bar" class="w-1 self-stretch rounded-full mr-4"></div><div class="flex-1 text-left"><div class="flex items-center gap-3 mb-1"><span id="modal-title-text" class="text-[10px] font-black uppercase tracking-wider"></span><div class="w-px h-3 bg-slate-200"></div><span id="modal-target" class="text-sm font-bold text-slate-800"></span></div><div id="modal-desc" class="text-sm text-slate-700 font-medium leading-relaxed"></div></div></div></div></div>
<audio id="global-player" class="hidden"></audio>
<script>
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwXjpU2jbuvLoLRIW5xqMZJTe728VOylyGBAP192o27Y1CJisC6vb6dOmO94a7lKjvA/exec";
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('id') || "tomohiro.19";
let portalData = {}; let currentApp = 'vocabulary'; let currentModeIdx = 0; let currentSubKey = ""; let currentTheme = ""; let examIdx = 0; let currentExamNum = 1; let examResults = []; let shadowingMode = 'front'; let currentAudioUrl = ""; let phCompletedIds = new Set();
let mediaRecorder; let audioChunks = [];
const HL_TYPES = ['Linking', 'Reduction', 'Flap T', 'Special Sound Changes'];
const HL_COLORS = { 'Linking': 'var(--hl-blue)', 'Reduction': 'var(--hl-pink)', 'Flap T': 'var(--hl-green-soft)', 'Special Sound Changes': 'var(--hl-yellow)' };
const BOLD_COLORS = { 'Linking': '#2563eb', 'Reduction': '#db2777', 'Flap T': '#059669', 'Special Sound Changes': '#db2777' };

function switchApp(appName) {
    currentApp = appName; currentModeIdx = 0; examIdx = 0; currentTheme = ""; currentSubKey = ""; examResults = []; shadowingMode = 'front';
    document.querySelectorAll('.footer-item').forEach(el => el.classList.remove('active'));
    const navEl = document.getElementById(`nav-${appName}`); if(navEl) navEl.classList.add('active');
    const titles = { chunk:'Sentence Building', topicTalk:'Topic Talk', shadowing:'Shadowing', reading:'Reading', pronunciation:'Pronunciation', speaking:'Speaking Form', vocabulary:'Vocabulary', grammar:'Grammar' };
    document.getElementById('app-title').innerText = titles[appName];
    const modeArea = document.getElementById('mode-buttons-area'), slider = document.getElementById('mode-slider');
    let modes = ['Training', 'Exam'];
    if (appName === 'shadowing') modes = ['Practice']; else if (appName === 'reading' || appName === 'topicTalk') modes = ['Topic']; else if (appName === 'pronunciation') modes = ['Explain', 'Video', 'Exam']; else if (appName === 'grammar' || appName === 'speaking') modes = ['Explain', 'Exam']; else if (appName === 'vocabulary') modes = ['List', 'Exam'];
    document.getElementById('mode-wrapper').style.display = (modes.length <= 1) ? 'none' : 'block';
    slider.style.width = `calc(100% / ${modes.length} - 2px)`;
    modeArea.innerHTML = modes.map((m, i) => `<div onclick="switchMode(${i})" class="mode-switch-btn ${i===0?'active':''}" id="mbtn-${i}">${m}</div>`).join('');
    document.getElementById('main-content-area').innerHTML = "";
    switchMode(0); renderCategories();
}
function switchMode(idx) { currentModeIdx = idx; document.getElementById('mode-slider').style.transform = `translateX(${idx * 100}%)`; document.querySelectorAll('.mode-switch-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx)); document.getElementById('ph-progress-area').classList.toggle('hidden', !(currentApp === 'pronunciation' && currentModeIdx === 2)); renderThemes(); }
function renderCategories() {
    const container = document.getElementById('category-container'), data = portalData[currentApp]; if(!data) return;
    const key = (currentApp === 'chunk' || currentApp === 'shadowing' || currentApp === 'topicTalk') ? 'lesson' : (portalData[currentApp][0].category ? 'category' : 'lesson');
    const uniqueKeys = [...new Set(data.map(item => item.lesson || item.category))].filter(Boolean);
    if (!currentSubKey || !uniqueKeys.includes(currentSubKey)) currentSubKey = uniqueKeys[0];
    container.innerHTML = uniqueKeys.map(k => `<button onclick="selectSubKey('${k}')" class="category-tab ${currentSubKey === k ? 'active' : ''}">${k.charAt(0).toUpperCase() + k.slice(1).toLowerCase()}</button>`).join('');
    renderThemes();
}
function renderThemes() {
    const themeMenu = document.getElementById('theme-menu-container'), themeList = document.getElementById('theme-scroll-list');
    const isEx = (currentApp === 'pronunciation' ? currentModeIdx === 2 : (currentApp === 'chunk' || currentApp === 'vocabulary' || currentApp === 'grammar' || currentApp === 'speaking' ? currentModeIdx === 1 : false));
    if (isEx || currentApp === 'vocabulary') { themeMenu.classList.add('hidden'); renderContent(); return; }
    const data = portalData[currentApp], key = (currentApp === 'chunk' || currentApp === 'shadowing' || currentApp === 'topicTalk') ? 'lesson' : (portalData[currentApp][0].category ? 'category' : 'lesson');
    const filteredBySub = data.filter(d => (d.lesson || d.category) === currentSubKey);
    const themes = [...new Set(filteredBySub.map(d => d.theme || d.point))].filter(Boolean);
    if (themes.length === 0) { themeMenu.classList.add('hidden'); renderContent(); return; }
    if (!currentTheme || !themes.includes(currentTheme)) currentTheme = themes[0];
    themeMenu.classList.remove('hidden'); themeList.innerHTML = themes.map(t => `<div onclick="selectTheme('${t}')" class="theme-item ${currentTheme === t ? 'active' : ''}">${currentApp==='shadowing'?'#'+t:t}</div>`).join('');
    renderContent();
}
function selectSubKey(key) { currentSubKey = key; currentTheme = ""; examIdx = 0; examResults = []; shadowingMode = 'front'; renderCategories(); }
function selectTheme(themeName) { currentTheme = themeName; shadowingMode = 'front'; renderThemes(); }
function generateProgressDotsHtml(total, current) {
    let rows = Math.ceil(total / 10), html = `<div class="flex flex-col items-center gap-1.5 mb-6">`;
    for(let r=0; r<rows; r++) { html += `<div class="flex gap-1.5">`; for(let i=0; i<10; i++) { let idx = r * 10 + i; if(idx < total) html += `<div class="progress-dot ${idx < current ? 'filled' : ''}"></div>`; } html += `</div>`; }
    return html + `</div>`;
}

function renderContent() {
    const area = document.getElementById('main-content-area'), data = portalData[currentApp]; if(!data) return;
    const isEx = (currentApp === 'pronunciation' ? currentModeIdx === 2 : currentModeIdx === 1);
    const filtered = data.filter(d => (d.lesson || d.category) === currentSubKey && (isEx || (!currentTheme || d.theme === currentTheme || d.point === currentTheme || currentApp === 'vocabulary')));
    
    if (currentApp === 'pronunciation') {
        if (currentModeIdx === 0) { area.innerHTML = `<div class="word-card p-8 text-slate-700 text-left leading-normal">${portalData.pronunciationManual[currentSubKey.toLowerCase().trim()] || "Coming soon!"}</div>`; }
        else if (currentModeIdx === 1) { const vids = []; data.filter(i => i.category === currentSubKey).forEach(item => { if (item.videos) item.videos.forEach(v => { if (!vids.includes(v)) vids.push(v); }); }); area.innerHTML = vids.length > 0 ? `<div class="flex flex-col">${vids.map(v => `<div class="video-wrapper">${v}</div>`).join('')}</div>` : `<p class="py-10 font-bold">No videos available.</p>`; }
        else { updatePhProgress(currentSubKey); area.innerHTML = `<div class="space-y-4">` + filtered.map((item, idx) => { const id = `${currentSubKey}-${idx}`; const isDone = phCompletedIds.has(id); return `<div id="phcard-${id}" class="word-card p-5 flex items-center justify-between shadow-sm ${isDone ? 'success-mode' : ''}"><div class="good-label" id="phlabel-${id}">Good!</div><div class="ph-card-content flex-1 min-w-0"><div class="text-2xl font-black text-slate-900 tracking-tight mb-1" onclick="playTTS('${item.word}')">${item.word}</div><div class="flex items-center gap-2 text-slate-400 text-sm font-bold mb-2"><span>${item.symbol}</span><span>${item.katakana}</span><span>|</span><span>${item.translation}</span></div><div class="text-[10px] font-black text-kepty-orange uppercase text-left">${item.point}</div></div><div class="flex flex-col items-center gap-4"><button onclick="playTTS('${item.word}')" class="w-9 h-9 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center"><i data-lucide="volume-2" class="w-5 h-5"></i></button><button id="phbtn-${id}" onclick="toggleRecord('${id}')" class="record-btn shrink-0 ${isDone ? 'bg-kepty-light-orange' : ''}"><i data-lucide="mic" class="w-6 h-6"></i></button></div></div>`; }).join('') + `</div>`; }
    } else if (currentModeIdx === 0) {
        if (currentApp === 'chunk') { 
            let h = filtered[0]?.point ? `<section class="bg-slate-100 p-5 rounded-[24px] border border-slate-200 mb-6 text-left text-sm font-bold text-slate-700 leading-normal"><div class="flex items-center gap-2 mb-2"><span class="text-[10px] font-black bg-slate-700 text-white px-2 py-0.5 rounded tracking-widest uppercase">Point</span></div>${filtered[0].point}</section>` : ''; 
            area.innerHTML = h + `<div class="grid grid-cols-1 md:grid-cols-2 gap-3">` + filtered.map((item, i) => `<div class="flip-card-chunk" onclick="this.classList.toggle('flipped')" ontouchstart=""><div class="flip-card-inner"><div class="flip-card-front"><span class="absolute top-2 left-3 text-[10px] font-black text-kepty-orange opacity-60 font-mono">#${i+1}</span><div class="absolute bottom-2 right-2 text-slate-400 opacity-40"><i data-lucide="hand" class="w-4 h-4"></i></div><p class="text-base font-bold text-left leading-tight">${item.sentence}</p></div><div class="flip-card-back"><button onclick="event.stopPropagation(); playTTS('${item.answer.replace(/'/g, "\\'")}');" class="absolute top-2 right-3 p-1.5 hover:bg-emerald-100 rounded-lg text-emerald-600 transition-colors"><i data-lucide="volume-2" class="w-4 h-4"></i></button><span class="absolute top-2 left-3 text-[10px] font-black text-emerald-600 opacity-60 font-mono">#${i+1}</span><span class="text-[10px] text-emerald-600 font-bold block text-left">Answer</span><p class="text-base font-bold text-slate-800 text-left leading-tight">${item.answer}</p><div class="absolute bottom-2 right-2 text-slate-400 opacity-40"><i data-lucide="hand" class="w-4 h-4"></i></div></div></div></div>`).join('') + `</div>`; 
        }
        else if (currentApp === 'shadowing') { const item = filtered[0]; if (!item) return; area.innerHTML = `<div class="shadowing-content-card bg-white rounded-[24px] border border-f1f5f9 overflow-hidden"><div class="flex items-center justify-between p-6 border-b border-f1f5f9"><div class="mode-switch-container w-[230px]"><div class="mode-slider w-[calc(50%-2px)] ${shadowingMode==='back'?'translate-x-full':''}"></div><div onclick="shadowingMode='front'; renderContent();" class="mode-switch-btn ${shadowingMode==='front'?'active':''}">Script</div><div onclick="shadowingMode='back'; renderContent();" class="mode-switch-btn ${shadowingMode==='back'?'active':''}">Sound Changes</div></div><button id="sh-play-btn" onclick="playAudio('${item.audioId}', this)" class="w-11 h-11 rounded-full bg-slate-50 text-kepty-orange flex items-center justify-center shadow-sm active:scale-90 transition-all"><i data-lucide="volume-2"></i></button></div><div class="p-6 text-left"><p class="card-inner-title" style="color:var(--kepty-orange);">${shadowingMode==='front'?'Script':'Sound Changes'}</p><div class="text-slate-700 text-lg leading-[1.8] font-medium whitespace-pre-wrap text-left">${shadowingMode==='front' ? item.text : generateHighlightedHtml(item.text, item.highlights)}</div></div></div>`; }
        else if (currentApp === 'topicTalk') { 
            if (examIdx >= filtered.length) { area.innerHTML = `<div class="kepty-card flex items-center justify-center"><p class="text-4xl font-black text-kepty-orange tracking-tight mb-8">Complete!</p><div class="mt-4"><span onclick="examIdx=0; renderContent();" class="restart-link">Restart</span></div></div>`; lucide.createIcons(); return; }
            const item = filtered[examIdx]; if(!item) return; 
            area.innerHTML = generateProgressDotsHtml(filtered.length, examIdx) + `<div class="kepty-card flex-1 flex flex-col justify-between"><div class="mb-2"><span class="text-[10px] font-black text-kepty-orange uppercase bg-kepty-light-orange px-2 py-0.5 rounded-md">${item.theme}</span></div><p class="text-xl font-bold text-slate-800 mb-8 whitespace-pre-wrap">${item.training_topic}</p><div class="flex flex-col items-center gap-6 mt-6"><div class="voice-wave"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div><div class="flex items-center justify-center gap-6 w-full px-10"><button onclick="examIdx = Math.max(0, examIdx-1); renderContent();" class="nav-icon-btn p-4 bg-white/50 text-slate-400 rounded-full shadow-sm ${examIdx===0?'invisible':''} active:scale-95"><i data-lucide="chevron-left"></i></button><div class="exam-mic-btn" onclick="toggleGenericRecord()"><i data-lucide="mic"></i></div><button onclick="topicTalkNext(${filtered.length})" class="nav-icon-btn p-4 next-btn-orange rounded-full shadow-lg active:scale-95"><i data-lucide="chevron-right"></i></button></div></div></div>`; 
        }
        else if (currentApp === 'reading') { 
            const item = filtered[0]; if (!item) return; 
            area.innerHTML = `<section class="space-y-4 text-left mb-10"><div class="flex items-center gap-2 mb-4"><div class="w-1 h-6 bg-kepty-orange rounded-full"></div><h2 class="text-lg font-black text-slate-900 tracking-tight">Words and Phrases</h2></div><div class="grid grid-cols-1 md:grid-cols-2 gap-3">` + 
            item.keywords.map(k => `<div class="word-card p-4 shadow-sm border-slate-100 flex flex-col"><div class="flex justify-between items-start mb-1"><h4 class="text-xl font-black text-slate-900">${k.word}</h4><div class="flex flex-col items-end gap-1"><span class="text-[9px] font-black text-kepty-orange uppercase bg-kepty-light-orange px-1.5 py-0.5 rounded">${k.pos}</span><button onclick="playTTS('${k.word.replace(/'/g, "\\'")}')" class="p-1 text-slate-400"><i data-lucide="volume-2" class="w-4 h-4"></i></button></div></div><p class="text-[10px] text-slate-400 font-mono mb-2">${k.phonetic}</p><p class="font-bold text-sm text-slate-700">${k.meaning}</p></div>`).join('') + `</div></section><section class="text-left"><div class="flex items-center gap-2 mb-4"><div class="w-1 h-6 bg-kepty-orange rounded-full"></div><h2 class="text-lg font-black text-slate-900 tracking-tight">Reading Article</h2></div><div class="word-card p-6 md:p-10 shadow-sm border-slate-100 leading-[1.8] text-slate-700 font-medium whitespace-pre-wrap text-lg">${item.article}</div></section>`; 
        }
        else if (currentApp === 'speaking') { 
            const item = filtered[0]; if (!item) return; 
            area.innerHTML = `<div class="word-card p-8 shadow-sm text-left border-slate-100 flex flex-col gap-6"><h4 class="text-xl font-black text-slate-900 mb-0 tracking-tight">${item.point}</h4><section class="bg-slate-100 p-5 rounded-[24px] border border-slate-200 text-sm font-medium text-slate-700 leading-normal whitespace-pre-wrap"><div class="flex items-center gap-2 mb-2"><span class="text-[10px] font-black bg-slate-700 text-white px-2 py-0.5 rounded tracking-widest uppercase">Point</span></div>${item.background}</section><div class="bg-slate-50 p-5 rounded-xl border border-slate-100"><p class="text-[9px] font-black text-kepty-orange uppercase tracking-wider mb-2">Example Sentences</p><p class="text-sm text-slate-600 whitespace-pre-line leading-relaxed" style="font-style: normal;">${item.example}</p></div></div>`; 
        }
        else if (currentApp === 'vocabulary') { 
            area.innerHTML = `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">` + filtered.map(w => `<div class="flip-card-voc" onclick="this.classList.toggle('flipped')" ontouchstart=""><div class="flip-card-inner"><div class="flip-card-front" style="justify-content: flex-start; padding-top: 24px;"><div class="flex justify-between items-start mb-0.5"><span class="text-[9px] font-black text-kepty-orange uppercase tracking-wider">${w.pos}</span><button onclick="event.stopPropagation(); playTTS('${w.word.replace(/'/g, "\\'")}')" class="w-9 h-9 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center -mt-2"><i data-lucide="volume-2" class="w-5 h-5"></i></button></div><h3 class="text-2xl font-black text-slate-900 mb-0.5 tracking-tight">${w.word}</h3><p class="text-slate-400 font-mono text-xs">${w.pronunciation}</p><div class="absolute bottom-2 right-2 text-slate-400 opacity-40"><i data-lucide="hand" class="w-4 h-4"></i></div></div><div class="flip-card-back"><h3 class="text-lg font-bold mb-2 text-slate-800">${w.meaning}</h3><div class="bg-black/5 p-3 rounded-xl text-[11px] italic text-slate-600 leading-relaxed overflow-y-auto max-h-[80px]">${w.example.replace(new RegExp(`(${w.word})`, 'gi'), '<strong>$1</strong>')}</div><div class="absolute bottom-2 right-2 text-slate-400 opacity-40"><i data-lucide="hand" class="w-4 h-4"></i></div></div></div></div>`).join('') + `</div>`; 
        }
        else area.innerHTML = `<div class="word-card p-8 text-slate-700 text-left leading-normal">${portalData.grammarManual[currentSubKey] || "No Explanation Prepared."}</div>`;
    } else renderExamStep(filtered);
    lucide.createIcons();
}

function topicTalkNext(len) { 
    if(examIdx < len) { 
        examIdx++; 
        renderContent(); 
    } 
}

function renderExamStep(pool) {
    const area = document.getElementById('main-content-area'); if (currentApp === 'shadowing' || currentApp === 'topicTalk' || currentApp === 'reading') return;
    let maxIdx = (currentApp === 'chunk') ? 30 : pool.length;
    if (examIdx >= maxIdx) { 
        const correctCount = examResults.filter(r => r.isCorrect).length;
        area.innerHTML = `<div class="kepty-card flex-1 flex flex-col justify-center items-center"><p class="text-4xl font-black text-kepty-orange tracking-tight text-center mb-8">Complete!</p><div class="mt-4 mb-8"><span onclick="examIdx=0; examResults=[]; renderContent();" class="restart-link">Restart</span></div>${(currentApp === 'vocabulary' || currentApp === 'grammar') ? `<div class="text-left w-full border-t border-slate-100 pt-6"><div class="flex items-center justify-between mb-4 px-2"><p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Review Results</p><p class="text-xs font-black text-emerald-600">Correct: ${correctCount}/${pool.length}</p></div><div class="max-h-[300px] overflow-y-auto no-scrollbar">${examResults.map(r => `<div class="review-item"><div class="flex items-start gap-2"><div class="w-4 h-4 mt-1 flex-shrink-0 flex items-center justify-center rounded-full ${r.isCorrect ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}"><i data-lucide="${r.isCorrect ? 'check' : 'x'}" class="w-3 h-3"></i></div><div class="flex-1"><div class="q tracking-tight">${r.q}</div><div class="a ${r.isCorrect ? 'text-emerald-600' : 'text-slate-400'}">${r.correctA}</div>${!r.isCorrect ? `<div class="text-rose-600 text-[10px] font-bold">You selected: ${r.userSel}</div>` : ''}</div></div></div>`).join('')}</div></div>` : ''}</div>`; lucide.createIcons(); return; 
    }
    if (currentApp === 'vocabulary' || currentApp === 'grammar') {
        const it = pool[examIdx]; let ops = [], qTitle = (currentApp === 'vocabulary') ? it.word : it.question;
        if (currentApp === 'vocabulary') { let distractors = portalData.vocabulary.filter(w => w.meaning !== it.meaning).map(w => w.meaning); distractors.sort(() => Math.random() - 0.5); ops = [it.meaning, ...distractors.slice(0, 3)].sort(() => Math.random() - 0.5); } else { ops = [it.answer, it.option2, it.option3, it.option4].filter(Boolean).sort(() => Math.random() - 0.5); }
        area.innerHTML = generateProgressDotsHtml(pool.length, examIdx) + `<div class="mb-4 text-left ${examIdx===0?'invisible':''}"><button onclick="examIdx--; renderContent();" class="flex items-center gap-1 text-slate-400 font-bold text-xs"><i data-lucide="arrow-left" class="w-3 h-3"></i> Back</button></div><div class="text-center mb-8 px-2"><h2 class="text-xl md:text-2xl font-bold text-slate-900 tracking-tight leading-snug">${qTitle}</h2></div><div id="quiz-options-grid" class="grid grid-cols-1 gap-3 max-w-xl mx-auto">${ops.map(o => `<button onclick="handleExamAnswer('${qTitle.replace(/'/g, "\\'")}', '${o.replace(/'/g, "\\'")}', '${(currentApp==='vocabulary'?it.meaning:it.answer).replace(/'/g, "\\'")}', this)" class="quiz-option-btn text-left"><div class="quiz-badge"></div>${o}</button>`).join('')}</div>`;
    } else if (currentApp === 'chunk') { 
        const ex = pool[0][`exam_${currentExamNum}`];
        area.innerHTML = generateProgressDotsHtml(30, examIdx) + `<p class="text-sm font-bold text-slate-700 mb-4 px-1 text-center">以下の日本語を英語に訳してください。</p><div class="kepty-card flex-1 flex flex-col justify-between"><div class="mt-1 mb-4 px-2 text-center flex-1 flex justify-center items-center"><p class="text-lg md:text-xl font-bold text-slate-800 leading-relaxed">${ex[examIdx] || "No Data"}</p></div><div class="voice-wave"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div><div class="flex items-center justify-center gap-6 mt-6 px-10"><button onclick="examIdx = Math.max(0, examIdx-1); renderContent();" class="nav-icon-btn p-4 bg-white/50 text-slate-400 rounded-full shadow-sm ${examIdx===0?'invisible':''} active:scale-95"><i data-lucide="chevron-left"></i></button><div class="exam-mic-btn" onclick="toggleGenericRecord()"><i data-lucide="mic"></i></div><button onclick="examIdx++; renderContent();" class="nav-icon-btn p-4 next-btn-orange rounded-full shadow-lg active:scale-95"><i data-lucide="chevron-right"></i></button></div></div>`; 
    }
    else if (currentApp === 'speaking' || currentApp === 'pronunciation') { 
        const it = pool[examIdx]; area.innerHTML = generateProgressDotsHtml(pool.length, examIdx) + `<div class="kepty-card flex-1 flex flex-col justify-between">${currentApp==='speaking'?`<div class="sp-rule-box"><span class="sp-rule-badge">RULE</span><p class="sp-rule-text whitespace-pre-line leading-relaxed text-sm">${it.rules}</p></div>`:''}<div class="px-2 text-center mb-6 flex-1 flex justify-center items-center"><p class="text-lg md:text-xl font-bold text-slate-900 leading-relaxed tracking-tight">${it.assignment || it.word}</p></div><div class="voice-wave"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div><div class="flex items-center justify-center gap-6 mt-6 px-10"><button onclick="examIdx = Math.max(0, examIdx-1); renderContent();" class="nav-icon-btn p-4 bg-white/50 text-slate-400 rounded-full shadow-sm ${examIdx===0?'invisible':''} active:scale-95"><i data-lucide="chevron-left"></i></button><div class="exam-mic-btn" onclick="toggleGenericRecord()"><i data-lucide="mic"></i></div><button onclick="examIdx++; renderContent();" class="nav-icon-btn p-4 next-btn-orange rounded-full shadow-lg active:scale-95"><i data-lucide="chevron-right"></i></button></div></div>`; 
    }
    lucide.createIcons();
}
function handleExamAnswer(q, sel, cor, btn) { 
    const grid = document.getElementById('quiz-options-grid'); grid.style.pointerEvents = 'none'; 
    const isCor = (sel === cor); examResults.push({ q: q, userSel: sel, correctA: cor, isCorrect: isCor }); 
    grid.querySelectorAll('.quiz-option-btn').forEach(b => { 
        const badge = b.querySelector('.quiz-badge');
        if (b.innerText.trim() === cor) { b.style.border = "2px solid #10b981"; b.style.background = "#ecfdf5"; badge.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i>'; badge.className = "quiz-badge correct"; } 
        else if (b === btn && !isCor) { b.style.border = "2px solid #ef4444"; b.style.background = "#fef2f2"; badge.innerHTML = '<i data-lucide="x" class="w-4 h-4"></i>'; badge.className = "quiz-badge incorrect"; } 
    }); 
    lucide.createIcons(); setTimeout(() => { examIdx++; renderContent(); }, 1500); 
}
async function toggleGenericRecord() {
    if (!mediaRecorder || mediaRecorder.state === "inactive") {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream); audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader(); reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
                const base64data = reader.result.split(',')[1];
                const payload = { userId: userId, app: currentApp, theme: currentTheme || currentSubKey, audioBase64: base64data };
                fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) }).then(res => res.json()).then(data => console.log("Saved:", data));
            };
        };
        mediaRecorder.start();
    } else { mediaRecorder.stop(); }
}
function toggleRecord(id) {
    const btn = document.getElementById(`phbtn-${id}`), card = document.getElementById(`phcard-${id}`), lbl = document.getElementById(`phlabel-${id}`);
    if (!btn.classList.contains('recording')) { btn.classList.add('recording'); toggleGenericRecord(); }
    else { btn.classList.remove('recording'); toggleGenericRecord(); card.classList.add('card-judging'); setTimeout(() => { phCompletedIds.add(id); card.classList.add('success-mode'); lbl.classList.add('show'); setTimeout(() => { lbl.classList.remove('show'); card.classList.remove('card-judging'); renderContent(); }, 1500); }, 300); }
}
function updatePhProgress(cat) { const f = portalData.pronunciation.filter(d => (d.category || d.lesson) === cat); document.getElementById('ph-progress-dots').innerHTML = Array.from({length: f.length}).map((_, i) => `<div class="progress-dot ${phCompletedIds.has(cat + '-' + i) ? 'filled' : ''}"></div>`).join(''); }
function playAudio(d, b) { 
    const p = document.getElementById('global-player'), s = "https://docs.google.com/uc?export=download&id=" + d.trim(); 
    if (currentAudioUrl === s && !p.paused) { p.pause(); b.innerHTML = '<i data-lucide="volume-2"></i>'; } 
    else { if (currentAudioUrl !== s) { p.src = s; currentAudioUrl = s; } p.play(); b.innerHTML = '<i data-lucide="pause"></i>'; } 
    p.onended = () => { b.innerHTML = '<i data-lucide="volume-2"></i>'; lucide.createIcons(); }; 
    lucide.createIcons();
}
function playTTS(text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.9; window.speechSynthesis.speak(u); }
function generateHighlightedHtml(text, hls) { if (!hls || hls.length === 0) return text; let html = text; hls.forEach((hl, idx) => { const regex = new RegExp(`(${hl.target})`, 'g'); html = html.replace(regex, `<span class="hl-overlay" onclick="openShadowModal(${idx})" style="text-decoration: underline; text-decoration-color: ${HL_COLORS[hl.type]}; text-underline-offset: 4px; cursor: pointer;">$1</span>`); }); return html; }
function openShadowModal(idx) {
    const item = portalData.shadowing.find(d => d.theme === currentTheme && d.lesson === currentSubKey);
    if (!item || !item.highlights[idx]) return;
    const hl = item.highlights[idx], color = BOLD_COLORS[hl.type] || 'var(--kepty-orange)';
    document.getElementById('modal-bar').style.background = color;
    const titleEl = document.getElementById('modal-title-text'); titleEl.style.color = color; titleEl.innerText = hl.type;
    document.getElementById('modal-target').innerText = hl.target; document.getElementById('modal-desc').innerText = hl.explanation;
    document.getElementById('detail-modal').style.display = 'flex';
}
function runWelcomeOverlay() {
    const overlay = document.getElementById('welcome-overlay'), msgEl = document.getElementById('welcome-message');
    setTimeout(() => { msgEl.style.opacity = '1'; }, 500); 
    
    // バックグラウンドでデータを並列取得
    fetch(`${GAS_WEB_APP_URL}?id=${userId}`).then(res => res.json()).then(data => {
        portalData = data;
        // 取得完了時に画面が既に切り替わっていれば再描画して内容を表示
        if (overlay.style.display === 'none' && currentApp === 'vocabulary') {
            switchApp('vocabulary');
        }
    });

    // 取得状態に関わらず、開始から3秒後に必ずメイン画面へフェードアウト
    setTimeout(() => { 
        overlay.style.opacity = '0'; 
        setTimeout(() => { 
            overlay.style.display = 'none'; 
            switchApp('vocabulary'); 
            lucide.createIcons(); 
        }, 600); 
    }, 3000);
}
window.onload = () => { 
    runWelcomeOverlay(); 
    lucide.createIcons(); 
    const f = document.getElementById('main-footer'); 
    f.addEventListener('scroll', () => { document.getElementById('footer-arrow').style.display = (f.scrollLeft + f.clientWidth >= f.scrollWidth - 10) ? 'none' : 'flex'; });
};
</script>
</body>
</html>
