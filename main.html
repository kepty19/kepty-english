<script>
window.onerror = function(msg, url, line, col, err) { console.error('[GLOBAL ERROR]', msg, 'at line', line, ':', err); };
const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwXjpU2jbuvLoLRIW5xqMZJTe728VOylyGBAP192o27Y1CJisC6vb6dOmO94a7lKjvA/exec";
const urlParams = new URLSearchParams(window.location.search);
const userId = urlParams.get('id') || "tomohiro.19";
localStorage.setItem('keptyUserId', userId);

const initialFetch = fetch(`${GAS_WEB_APP_URL}?id=${userId}`).then(res => res.json());

let portalData = null; let currentApp = 'vocabulary'; let currentModeIdx = 0; let currentSubKey = ""; let currentTheme = ""; let examIdx = 0; let currentExamNum = 1; let examResults = []; let shadowingMode = 'script'; let readingViewMode = 'reading'; let currentAudioUrl = ""; let phCompletedIds = new Set();
let mediaRecorder; let audioChunks = [];
const HL_TYPES = ['Linking', 'Reduction', 'Flap T', 'Special Sound Changes'];
const HL_COLORS = { 'Linking': 'var(--hl-blue)', 'Reduction': 'var(--hl-pink)', 'Flap T': 'var(--hl-green-soft)', 'Special Sound Changes': 'var(--hl-yellow)', 'Special': 'var(--hl-yellow)' };
const BOLD_COLORS = { 'Linking': '#2563eb', 'Reduction': '#db2777', 'Flap T': '#059669', 'Special Sound Changes': '#a16207', 'Special': '#a16207' };

function getTrainingMeta(appName) {
    const meta = {
        vocabulary: {description: '表現の幅が広がり、伝えたいことを正確に言語化できるようになります。単語単体ではなく、例文とともに「どう使うか」の文脈をセットで覚えると最善です。' },
        pronunciation: { skillIcon: 'audio-lines', skillText: 'Phonetic Accuracy', description: '会話の内容が聞き取れない、相手に聞き返される、そのようなストレスをなくせるようになります。自分の声とネイティブの音との「わずかな差」を客観的に修正し続けることが上達の近道です。' },
        grammar: { skillIcon: 'book-open-check', skillText: 'Structural Clarity', description: '言葉を正しくつなぐルールを理解することで、誤解のない正確な意思疎通が可能になります。形を暗記するだけでなく「なぜその形になるのか」という概念を理解し、実際に文を作る練習が不可欠です。' },
        shadowing: { skillIcon: 'headphones', skillText: 'Listening Fluency', description: '英語特有のリズムや強弱、音の変化が身につき、リスニング力と流暢さが飛躍的に向上します。ただ音を追うだけでなく、常に文章の意味を頭に浮かべながら行うことで「脳の回路」が強化されます。' },
        reading: { skillIcon: 'book-marked', skillText: 'Logical Reading', description: '文脈の中での語彙・文法の使われ方を学び、素早く・論理的に英語を理解する力が養われます。一言一句を訳そうとせず、文章全体の情景や筆者の意図をイメージで捉える意識が大切です。' },
        topicTalk: { skillIcon: 'message-circle', skillText: 'Opinion Delivery', description: '特定のテーマについて自分の意見を論理的に展開し、会話を継続させる力がつきます。事前にキーワードを準備した上で、詰まっても別の表現で言い換える（パラフレーズ）粘り強さが鍵となります。' },
        speaking: { skillIcon: 'message-square', skillText: 'Speaking Framework', description: 'スピーキング時の適切な表現方法・型を習得し、より相手に納得感を与える話し方ができるようになります。日本語と英語の表現方法の違いを理解することで、日本語的な話し方から脱却します。' },
        chunk: { skillIcon: 'layers', skillText: 'Response Speed', description: '頭の中にある断片的な情報を瞬時に文章化し、会話のレスポンス速度を高めます。簡単な文から始め、接続詞などを使って徐々に情報を肉付けしていくステップアップが非常に有効です。' }
    };
    return meta[appName] || { skillIcon: 'sparkles', skillText: 'Training', description: '' };
}

function switchApp(appName) {
    currentApp = appName; currentModeIdx = 0; examIdx = 0; currentTheme = ""; currentSubKey = ""; examResults = []; shadowingMode = 'script'; readingViewMode = 'reading';
    document.querySelectorAll('.footer-item').forEach(el => el.classList.remove('active'));
    const navEl = document.getElementById(`nav-${appName}`); if(navEl) navEl.classList.add('active');
    const titles = { chunk:'Sentence Building', topicTalk:'Topic Talk', shadowing:'Shadowing', reading:'Reading', pronunciation:'Pronunciation', speaking:'Speaking Form', vocabulary:'Vocabulary', grammar:'Grammar' };
    document.getElementById('app-title').innerText = titles[appName];
    const meta = getTrainingMeta(appName);
    const desc = document.getElementById('app-description');
    if (desc) {
        desc.innerText = meta.description;
    }
    const modeArea = document.getElementById('mode-buttons-area'), slider = document.getElementById('mode-slider');
    let modes = ['Training', 'Exam'];
    if (appName === 'shadowing') modes = ['Practice']; else if (appName === 'reading' || appName === 'topicTalk') modes = ['Topic']; else if (appName === 'pronunciation') modes = ['Explain', 'Video', 'Exam']; else if (appName === 'grammar' || appName === 'speaking') modes = ['Explain', 'Exam']; else if (appName === 'vocabulary') modes = ['List', 'Exam'];
    document.getElementById('mode-wrapper').style.display = (modes.length <= 1) ? 'none' : 'block';
    slider.style.width = `calc(100% / ${modes.length} - 2px)`;
    modeArea.innerHTML = modes.map((m, i) => `<div onclick="switchMode(${i})" class="mode-switch-btn ${i===0?'active':''}" id="mbtn-${i}">${m}</div>`).join('');
    document.getElementById('main-content-area').innerHTML = "";
    
    if (!portalData) {
        document.getElementById('category-container').innerHTML = "";
        document.getElementById('theme-menu-container').classList.add('hidden');
        document.getElementById('main-content-area').innerHTML = `<div class="flex flex-col items-center justify-center py-20 text-slate-300"><i data-lucide="loader-2" class="w-8 h-8 animate-spin mb-4"></i><p class="text-sm font-bold tracking-widest uppercase">Loading Data...</p></div>`;
        lucide.createIcons();
        return;
    }
    
    switchMode(0); renderCategories();
}
function switchMode(idx) { currentModeIdx = idx; document.getElementById('mode-slider').style.transform = `translateX(${idx * 100}%)`; document.querySelectorAll('.mode-switch-btn').forEach((btn, i) => btn.classList.toggle('active', i === idx)); document.getElementById('ph-progress-area').classList.add('hidden'); renderThemes(); }
function renderCategories() {
    const container = document.getElementById('category-container');
    const data = currentApp === 'grammar' ? getActiveGrammarData() : portalData[currentApp];
    if(!data) return;
    const uniqueKeys = [...new Set(data.map(item => item.lesson || item.category))].filter(Boolean);
    if (uniqueKeys.length === 0) {
        currentSubKey = '';
        container.innerHTML = '';
        renderThemes();
        return;
    }
    if (!currentSubKey || !uniqueKeys.includes(currentSubKey)) currentSubKey = uniqueKeys[0];
    container.innerHTML = uniqueKeys.map(k => {
        const safe = String(k).replace(/'/g, "\\'");
        const label = currentApp === 'pronunciation' ? String(k).toLowerCase() : String(k);
        return `<button onclick="selectSubKey('${safe}')" class="category-tab ${currentSubKey === k ? 'active' : ''}">${label}</button>`;
    }).join('');
    renderThemes();
}
function renderThemes() {
    const themeMenu = document.getElementById('theme-menu-container'), themeList = document.getElementById('theme-scroll-list');
    const isEx = (currentApp === 'pronunciation' ? currentModeIdx === 2 : (currentApp === 'chunk' || currentApp === 'vocabulary' || currentApp === 'grammar' || currentApp === 'speaking' ? currentModeIdx === 1 : false));
    const pronunciationExamWithSubcategories = currentApp === 'pronunciation' && currentModeIdx === 2;
    if ((isEx && !pronunciationExamWithSubcategories) || currentApp === 'vocabulary') { themeMenu.classList.add('hidden'); renderContent(); return; }
    const data = currentApp === 'grammar' ? getActiveGrammarData() : portalData[currentApp];
    if (!data || data.length === 0) { themeMenu.classList.add('hidden'); renderContent(); return; }
    const filteredBySub = data.filter(d => (d.lesson || d.category) === currentSubKey);
    const themes = [...new Set(filteredBySub.map(d => d.theme || d.point || d.subcategory))].filter(Boolean);
    if (themes.length === 0) { themeMenu.classList.add('hidden'); renderContent(); return; }
    if (!currentTheme || !themes.includes(currentTheme)) currentTheme = themes[0];
    themeMenu.classList.remove('hidden'); themeList.innerHTML = themes.map(t => `<div onclick="selectTheme('${t}')" class="theme-item ${currentTheme === t ? 'active' : ''}">${currentApp==='shadowing'?'#'+t:t}</div>`).join('');
    renderContent();
}
function selectSubKey(key) { currentSubKey = key; currentTheme = ""; examIdx = 0; examResults = []; shadowingMode = 'script'; readingViewMode = 'reading'; stopAudio(); renderCategories(); }
function selectTheme(themeName) { currentTheme = themeName; shadowingMode = 'script'; readingViewMode = 'reading'; stopAudio(); renderThemes(); }
function stopAudio() { const p = document.getElementById('global-player'); p.pause(); p.currentTime = 0; currentAudioIdx = null; currentAudioTime = 0; }
function generateProgressDotsHtml(total, current, columns = 10) {
    let rows = Math.ceil(total / columns), html = `<div class="flex flex-col items-center gap-1.5 mb-6">`;
    for(let r=0; r<rows; r++) { html += `<div class="flex gap-1.5">`; for(let i=0; i<columns; i++) { let idx = r * columns + i; if(idx < total) html += `<div class="progress-dot ${idx < current ? 'filled' : ''}"></div>`; } html += `</div>`; }
    return html + `</div>`;
}

function normalizeTextKey(v) {
    return String(v || '').trim().toLowerCase();
}

const DEFAULT_LOCAL_GRAMMAR = { grammar: [], grammarManual: {} };
let LOCAL_GRAMMAR = { ...DEFAULT_LOCAL_GRAMMAR };

function normalizeLocalGrammarData(raw) {
    const out = { grammar: [], grammarManual: {} };
    if (!raw || typeof raw !== 'object') return out;

    const categories = Array.isArray(raw.categories) ? raw.categories : [];
    categories.forEach(entry => {
        const category = String(entry?.category || '').trim();
        if (!category) return;

        const explain = String(entry?.explain || '').trim();
        if (explain) out.grammarManual[category] = explain;

        const examRows = Array.isArray(entry?.exam) ? entry.exam : [];
        examRows.forEach(row => {
            const question = String(row?.question || '').trim();
            const answer = String(row?.answer || '').trim();
            if (!question || !answer) return;
            out.grammar.push({
                category,
                question,
                answer,
                option2: String(row?.option2 || '').trim(),
                option3: String(row?.option3 || '').trim(),
                option4: String(row?.option4 || '').trim(),
                explanation: String(row?.explanation || '').trim()
            });
        });
    });

    return out;
}

async function loadLocalGrammarData() {
    try {
        const res = await fetch('./grammar-local.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        LOCAL_GRAMMAR = normalizeLocalGrammarData(json);
        console.info('[GrammarLocal] Loaded grammar-local.json', {
            examCount: LOCAL_GRAMMAR.grammar.length,
            explainCount: Object.keys(LOCAL_GRAMMAR.grammarManual || {}).length
        });
    } catch (err) {
        LOCAL_GRAMMAR = { ...DEFAULT_LOCAL_GRAMMAR };
        console.warn('[GrammarLocal] grammar-local.json not loaded.', err);
    }
}

const localGrammarFetch = loadLocalGrammarData();

function getActiveGrammarData() {
    return Array.isArray(LOCAL_GRAMMAR.grammar) ? LOCAL_GRAMMAR.grammar : [];
}

function getActiveGrammarManual() {
    return LOCAL_GRAMMAR.grammarManual && typeof LOCAL_GRAMMAR.grammarManual === 'object'
        ? LOCAL_GRAMMAR.grammarManual
        : {};
}

const DEFAULT_LOCAL_PRON_TRANSLATIONS = { byKey: {}, byWord: {} };
let LOCAL_PRON_TRANSLATIONS = normalizeLocalPronTranslations(window.KEPTY_PRON_TRANSLATIONS || DEFAULT_LOCAL_PRON_TRANSLATIONS);

function normalizePronWordKey(v) {
    return normalizeTextKey(v).replace(/\s*\/\s*/g, '/').replace(/\s+/g, ' ');
}

function buildPronTranslationKey(category, subcategory, point, word) {
    return `${normalizeTextKey(category)}::${normalizeTextKey(subcategory)}::${normalizeTextKey(point)}::${normalizeTextKey(word)}`;
}

function normalizeLocalPronTranslations(raw) {
    const out = { byKey: {}, byWord: {} };
    if (!raw || typeof raw !== 'object') return out;

    Object.entries(raw.byKey || {}).forEach(([k, v]) => {
        const key = String(k || '').trim();
        const val = String(v || '').trim();
        if (!key || !val) return;
        out.byKey[key] = val;
    });

    Object.entries(raw.byWord || {}).forEach(([k, v]) => {
        const key = normalizeTextKey(k);
        const val = String(v || '').trim();
        if (!key || !val) return;
        out.byWord[key] = val;
    });

    return out;
}

async function loadLocalPronunciationTranslations() {
    try {
        if (window.KEPTY_PRON_TRANSLATIONS && typeof window.KEPTY_PRON_TRANSLATIONS === 'object') {
            LOCAL_PRON_TRANSLATIONS = normalizeLocalPronTranslations(window.KEPTY_PRON_TRANSLATIONS);
            console.info('[PronLocalTranslation] Loaded pronunciation-local-translation.js', {
                byKeyCount: Object.keys(LOCAL_PRON_TRANSLATIONS.byKey || {}).length,
                byWordCount: Object.keys(LOCAL_PRON_TRANSLATIONS.byWord || {}).length
            });
            return;
        }

        const res = await fetch('./content/data/pronunciation-local-translation.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        LOCAL_PRON_TRANSLATIONS = normalizeLocalPronTranslations(json);
        console.info('[PronLocalTranslation] Loaded pronunciation-local-translation.json', {
            byKeyCount: Object.keys(LOCAL_PRON_TRANSLATIONS.byKey || {}).length,
            byWordCount: Object.keys(LOCAL_PRON_TRANSLATIONS.byWord || {}).length
        });
    } catch (err) {
        LOCAL_PRON_TRANSLATIONS = { ...DEFAULT_LOCAL_PRON_TRANSLATIONS };
        console.warn('[PronLocalTranslation] pronunciation-local-translation.json not loaded.', err);
    }
}

const localPronTranslationsFetch = loadLocalPronunciationTranslations();

function getLocalPronunciationTranslation(item) {
    const key = buildPronTranslationKey(item?.category, item?.subcategory, item?.point, item?.word);
    const fromKey = LOCAL_PRON_TRANSLATIONS.byKey?.[key] || '';
    if (fromKey) return fromKey;
    const wordKey = normalizeTextKey(item?.word);
    const fromWord = LOCAL_PRON_TRANSLATIONS.byWord?.[wordKey] || '';
    if (fromWord) return fromWord;

    const looseWordKey = normalizePronWordKey(item?.word);
    if (looseWordKey && looseWordKey !== wordKey) {
        return LOCAL_PRON_TRANSLATIONS.byWord?.[looseWordKey] || '';
    }
    return '';
}

function getPronunciationCardFields(item) {
    let word = String(item?.word || '');
    let symbol = String(item?.symbol || '');
    let katakana = String(item?.katakana || '');
    let translation = String(getLocalPronunciationTranslation(item) || '');

    // Some sheet layouts can arrive shifted by one column.
    // Auto-correct obvious cases so cards still show: word -> symbol -> katakana.
    const looksLikeWord = v => /[a-z]/i.test(v) && !/[\u0250-\u02af]/.test(v) && !/[\u02c8\u02cc\/]/.test(v);
    const looksLikeIpa = v => /[\u0250-\u02af\u02c8\u02cc\/]/.test(v);
    const looksLikePointLabel = v => /[「」]/.test(v) || (/[ぁ-んァ-ヶ一-龯]/.test(v) && !/[a-z]/i.test(v));
    const looksLikeJapanese = v => /[ぁ-ゖァ-ヺ一-龯々〆ヵヶ]/.test(String(v || ''));
    const hasHiraganaOrKanji = v => /[ぁ-ゖ一-龯々〆ヵヶ]/.test(String(v || ''));

    if (looksLikePointLabel(word) && looksLikeWord(symbol) && looksLikeIpa(katakana)) {
        word = symbol;
        symbol = katakana;
        katakana = String(item?.translation || '');
        translation = String(getLocalPronunciationTranslation({
            category: item?.category,
            subcategory: item?.subcategory,
            point: item?.point,
            word: word
        }) || getLocalPronunciationTranslation(item) || '');
    }

    // Only recover from katakana slot when it contains meaning text (hiragana/kanji),
    // not when it is just katakana pronunciation.
    // Endpoint translation is the only source for the card's last line.

    return { word, symbol, katakana, translation };
}

const DEFAULT_LOCAL_PRONUNCIATION_EXPLAIN = { byCategory: {}, byThemeKey: {} };
let LOCAL_PRONUNCIATION_EXPLAIN = { byCategory: {}, byThemeKey: {} };

function normalizeExplainMap(rawMap) {
    const out = { byCategory: {}, byThemeKey: {} };
    if (!rawMap || typeof rawMap !== 'object') return out;

    Object.entries(rawMap.byCategory || {}).forEach(([k, v]) => {
        if (typeof v !== 'string' || !String(v).trim()) return;
        const nk = normalizeTextKey(k);
        if (!nk) return;
        out.byCategory[nk] = v;
    });

    Object.entries(rawMap.byThemeKey || {}).forEach(([k, v]) => {
        if (typeof v !== 'string' || !String(v).trim()) return;
        const parts = String(k || '').split('::');
        if (parts.length !== 2) return;
        const c = normalizeTextKey(parts[0]);
        const t = normalizeTextKey(parts[1]);
        if (!c || !t) return;
        out.byThemeKey[`${c}::${t}`] = v;
    });

    return out;
}

async function loadLocalPronunciationExplain() {
    try {
        const res = await fetch('./localexplain.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        console.info('[PronExplain] Loaded localexplain.json', {
            byCategoryCount: Object.keys(LOCAL_PRONUNCIATION_EXPLAIN.byCategory || {}).length,
            byThemeCount: Object.keys(LOCAL_PRONUNCIATION_EXPLAIN.byThemeKey || {}).length
        });
    } catch (err) {
        LOCAL_PRONUNCIATION_EXPLAIN = { ...DEFAULT_LOCAL_PRONUNCIATION_EXPLAIN };
        console.warn('[PronExplain] localexplain.json not loaded. Fallback to backend/index sources.', err);
    }
}

function buildShadowingKey(lesson, theme) {

function normalizeLocalShadowingJapanese(raw) {

    const items = Array.isArray(raw) ? raw : [];

        if (!lesson || !theme || !japanese) return;

}

function buildReadingKey(category, theme) {

}

function normalizeLocalReadingModes(raw) {

        const theme = String(entry?.theme || '').trim();

function getLocalReadingModes(category, theme) {

}

function getLocalPronunciationExplain(category, theme) {
    const categoryKey = normalizeTextKey(category);
    const themeKey = normalizeTextKey(theme);
    const byTheme = LOCAL_PRONUNCIATION_EXPLAIN.byThemeKey?.[`${categoryKey}::${themeKey}`] || '';
    const byCategory = LOCAL_PRONUNCIATION_EXPLAIN.byCategory?.[categoryKey] || '';
    return byTheme || byCategory || '';
}

function getGrammarExplainText(categoryKeyRaw, grammarData, grammarManual) {
    const categoryKey = normalizeTextKey(categoryKeyRaw);
    const manualMap = grammarManual && typeof grammarManual === 'object' ? grammarManual : {};

    const exactManual = manualMap[categoryKeyRaw];
    if (String(exactManual || '').trim()) return String(exactManual);

    const normalizedManual = Object.entries(manualMap).find(([k]) => normalizeTextKey(k) === categoryKey)?.[1];
    if (String(normalizedManual || '').trim()) return String(normalizedManual);

    const fromExam = (Array.isArray(grammarData) ? grammarData : [])
        .filter(item => normalizeTextKey(item?.category) === categoryKey)
        .map(item => String(item?.explanation || '').trim())
        .filter(Boolean);

    if (fromExam.length > 0) {
        return Array.from(new Set(fromExam)).join('<br><br>');
    }

    return '';
}

        area.innerHTML = generateProgressDotsHtml(pool.length, examIdx, currentApp === 'vocabulary' ? 20 : 10) + `<div class="mb-4 text-left ${examIdx===0?'invisible':''}"><button onclick="examIdx--; renderContent();" class="flex items-center gap-1 text-slate-400 font-bold text-xs"><i data-lucide="arrow-left" class="w-3 h-3"></i> Back</button></div><div class="text-center mb-8 px-2"><h2 class="text-base md:text-lg font-semibold text-slate-900 tracking-tight leading-snug">${qTitle}</h2></div><div id="quiz-options-grid" class="grid grid-cols-1 gap-3 max-w-xl mx-auto">${ops.map(o => `<button onclick="handleExamAnswer('${qTitle.replace(/'/g, "\\'")}', '${o.replace(/'/g, "\\'")}', '${(currentApp==='vocabulary'?it.meaning:it.answer).replace(/'/g, "\\'")}', this)" class="quiz-option-btn text-left"><div class="quiz-badge"></div>${o}</button>`).join('')}</div>`;
    } else if (currentApp === 'chunk') { 
        const ex = pool[0][`exam_${currentExamNum}`];
        area.innerHTML = generateProgressDotsHtml(30, examIdx) + `<p class="text-sm font-bold text-slate-700 mb-4 px-1 text-center">以下の日本語を英語に訳してください。</p><div class="kepty-card flex-1 flex flex-col justify-between"><div class="mt-1 mb-4 px-2 text-center flex-1 flex justify-center items-center"><p class="text-base md:text-lg font-semibold text-slate-800 leading-relaxed">${ex[examIdx] || "No Data"}</p></div><div class="voice-wave"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div><div class="flex items-center justify-center gap-6 mt-6 px-10"><button onclick="examIdx = Math.max(0, examIdx-1); renderContent();" class="nav-icon-btn p-4 bg-white/50 text-slate-400 rounded-full shadow-sm ${examIdx===0?'invisible':''} active:scale-95"><i data-lucide="chevron-left"></i></button><div class="exam-mic-btn" onclick="toggleGenericRecord()"><i data-lucide="mic"></i></div><button onclick="examIdx++; renderContent();" class="nav-icon-btn p-4 next-btn-orange rounded-full shadow-lg active:scale-95"><i data-lucide="chevron-right"></i></button></div></div>`;

    else if (currentApp === 'speaking' || currentApp === 'pronunciation') {

            : `<div class="voice-wave"><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div></div><div class="flex items-center justify-center gap-6 mt-6 px-10"><button onclick="examIdx = Math.max(0, examIdx-1); renderContent();" class="nav-icon-btn p-4 bg-white/50 text-slate-400 rounded-full shadow-sm ${examIdx===0?'invisible':''} active:scale-95"><i data-lucide="chevron-left"></i></button><div class="exam-mic-btn" onclick="toggleGenericRecord()"><i data-lucide="mic"></i></div><button onclick="examIdx++; renderContent();" class="nav-icon-btn p-4 next-btn-orange rounded-full shadow-lg active:scale-95"><i data-lucide="chevron-right"></i></button></div>`;

function handleExamAnswer(q, sel, cor, btn) { 
    const grid = document.getElementById('quiz-options-grid'); grid.style.pointerEvents = 'none'; 
    const isCor = (sel === cor); examResults.push({ q: q, userSel: sel, correctA: cor, isCorrect: isCor }); 
    grid.querySelectorAll('.quiz-option-btn').forEach(b => { 
        const badge = b.querySelector('.quiz-badge');
        if (b.innerText.trim() === cor) { b.style.border = "2px solid #10b981"; b.style.background = "#ecfdf5"; badge.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i>'; badge.className = "quiz-badge correct"; } 
        else if (b === btn && !isCor) { b.style.border = "2px solid #ef4444"; b.style.background = "#fef2f2"; badge.innerHTML = '<i data-lucide="x" class="w-4 h-4"></i>'; badge.className = "quiz-badge incorrect"; } 
    }); 
    lucide.createIcons(); setTimeout(() => { examIdx++; renderContent(); }, 1500); 
}
async function toggleGenericRecord() {
    if (!mediaRecorder || mediaRecorder.state === "inactive") {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream); audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
            const reader = new FileReader(); reader.readAsDataURL(audioBlob);
            reader.onloadend = () => {
                const base64data = reader.result.split(',')[1];
                const payload = { userId: userId, app: currentApp, theme: currentTheme || currentSubKey, audioBase64: base64data };
                fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) }).then(res => res.json()).then(data => console.log("Saved:", data));
            };
        };
        mediaRecorder.start();
    } else { mediaRecorder.stop(); }
}
function toggleRecord(id) {
    const btn = document.getElementById(`phbtn-${id}`), card = document.getElementById(`phcard-${id}`), lbl = document.getElementById(`phlabel-${id}`);
    if (!btn.classList.contains('recording')) { btn.classList.add('recording'); toggleGenericRecord(); }
    else { btn.classList.remove('recording'); toggleGenericRecord(); card.classList.add('card-judging'); setTimeout(() => { phCompletedIds.add(id); card.classList.add('success-mode'); lbl.classList.add('show'); setTimeout(() => { lbl.classList.remove('show'); card.classList.remove('card-judging'); renderContent(); }, 1500); }, 300); }
}
function updatePhProgress(cat) { const f = portalData.pronunciation.filter(d => (d.category || d.lesson) === cat); document.getElementById('ph-progress-dots').innerHTML = Array.from({length: f.length}).map((_, i) => `<div class="progress-dot ${phCompletedIds.has(cat + '-' + i) ? 'filled' : ''}"></div>`).join(''); }
// Audio source setting: 'local' or 'drive' (set via admin-audio.html)
const AUDIO_SOURCE = localStorage.getItem('keptyAudioSource') || 'local';
// Local audio: lesson name -> folder name
const DEFAULT_LOCAL_AUDIO_MAP = {
    "TOEIC #Part3": "part3.01",
    "TED #Grit": "GRIT.02",
    "TED #30 days": "try.03",
    "TED #original thinkers": "ogthinkers.04",
    "First Step": "firststep.05"
};
const LEGACY_AUDIO_MAP_KEYS = {
    "part3": "TOEIC #Part3",
    "GRIT": "TED #Grit",
    "30 days": "TED #30 days",
    "Original thinkers": "TED #original thinkers"
};
function buildLocalAudioMap() {
    const stored = JSON.parse(localStorage.getItem('keptyLocalAudioMap') || 'null');
    const map = { ...DEFAULT_LOCAL_AUDIO_MAP };
    if (stored && typeof stored === 'object') {
        Object.assign(map, stored);
        Object.entries(LEGACY_AUDIO_MAP_KEYS).forEach(([legacyKey, newKey]) => {
            if (!map[newKey] && stored[legacyKey]) map[newKey] = stored[legacyKey];
            delete map[legacyKey];
        });
    }
    localStorage.setItem('keptyLocalAudioMap', JSON.stringify(map));
    return map;
}
const LOCAL_AUDIO_MAP = buildLocalAudioMap();
function getLocalAudioUrl(lesson, theme) {
    // Case-insensitive lookup: spreadsheet may say "TOEIC Part3" but map has "Toeic part3"
    const mapKey = Object.keys(LOCAL_AUDIO_MAP).find(k => k.toLowerCase() === lesson.toLowerCase());
    const folder = mapKey ? LOCAL_AUDIO_MAP[mapKey] : undefined;
    if (!folder) { console.warn('[Audio] No folder mapped for lesson:', lesson, 'Available keys:', Object.keys(LOCAL_AUDIO_MAP)); return ''; }
    // Use explicit theme-to-file mapping if available
    const themeMap = JSON.parse(localStorage.getItem('keptyThemeToFileMap') || 'null') || {};
    let fileNum = null;
    if (themeMap[lesson] && themeMap[lesson][theme]) {
        fileNum = themeMap[lesson][theme];
    }
    // Fallback: derive file number from theme order in portalData
    if (!fileNum && portalData && portalData.shadowing) {
        const lessonThemes = [...new Set(
            portalData.shadowing.filter(d => d.lesson === lesson).map(d => d.theme)
        )].filter(Boolean);
        const idx = lessonThemes.indexOf(theme);
        if (idx >= 0) fileNum = idx + 1;
    }
    if (!fileNum) { console.warn('[Audio] No file number resolved for lesson:', lesson, 'theme:', theme); return ''; }
    const url = `content/audios/${folder}/${fileNum}.mp3`;
    console.log('[Audio] Resolved URL:', url);
    return url;
}
function getDriveAudioUrl() {
    if (portalData && portalData.shadowing) {
        const lessonKey = String(currentSubKey || '').trim();
        const themeKey = String(currentTheme || '').trim();
        const item = portalData.shadowing.find(d => String(d.theme || '').trim() === themeKey && String(d.lesson || '').trim() === lessonKey);
        if (item && item.audioUrl) return item.audioUrl;
    }
    return '';
}
// Shadowing audio: pause/resume for same, restart for different
let currentAudioIdx = null;
let currentAudioUrlLink = "";
let currentAudioTime = 0;
function playAudio(audioId, btn) {
    console.log('[Audio] playAudio called. audioId:', audioId, 'btn:', btn, 'AUDIO_SOURCE:', AUDIO_SOURCE);
    const player = document.getElementById('global-player');
    // Choice-based: use whichever source the admin selected
    let audioUrl = '';
    if (AUDIO_SOURCE === 'local') {
        audioUrl = getLocalAudioUrl(currentSubKey, currentTheme);
    } else {
        audioUrl = getDriveAudioUrl();
        if (!audioUrl) {
            // GitHub Pages commonly starts with drive source and empty drive links; fallback keeps playback available.
            audioUrl = getLocalAudioUrl(currentSubKey, currentTheme);
            if (audioUrl) {
                console.warn('[Audio] Drive URL missing, using local fallback. Lesson:', currentSubKey, 'Theme:', currentTheme);
            }
        }
    }
    // 異なる番号の場合
    if (!audioUrl) {
        console.warn('[Audio] No audio URL available. Source:', AUDIO_SOURCE, 'Lesson:', currentSubKey, 'Theme:', currentTheme);
        return;
    }
    if (currentAudioIdx !== audioId) {
        player.pause();
        player.currentTime = 0;
        player.src = audioUrl;
        currentAudioIdx = audioId;
        currentAudioUrl = audioUrl;
        currentAudioTime = 0;
        player.play().catch(err => console.warn('[Audio] Playback failed:', err.message, 'URL:', audioUrl));
        btn.innerHTML = '<i data-lucide="pause"></i>';
    } else {
        // 同じ番号の場合
        if (!player.paused) {
            currentAudioTime = player.currentTime;
            player.pause();
            btn.innerHTML = '<i data-lucide="volume-2"></i>';
        } else {
            player.currentTime = currentAudioTime;
            player.play().catch(err => console.warn('[Audio] Resume failed:', err.message));
            btn.innerHTML = '<i data-lucide="pause"></i>';
        }
    }
    player.onended = () => {
        btn.innerHTML = '<i data-lucide="volume-2"></i>';
        lucide.createIcons();
        currentAudioTime = 0;
    };
    lucide.createIcons();
}



function playTTS(text) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.9; window.speechSynthesis.speak(u); }
function normalizeHighlightType(type) {
    const t = String(type || '').trim().toLowerCase();
    if (t === 'special' || t === 'special sound changes') return 'Special Sound Changes';
    if (t === 'linking') return 'Linking';
    if (t === 'reduction') return 'Reduction';
    if (t === 'flap t') return 'Flap T';
    return type;
}
function generateHighlightedHtml(text, hls) {
    if (!hls || hls.length === 0) return text;
    let html = text;
    hls.forEach((hl, idx) => {
        const normalizedType = normalizeHighlightType(hl.type);
        const color = HL_COLORS[normalizedType] || 'var(--hl-yellow)';
        const regex = new RegExp(`(${hl.target})`, 'g');
        html = html.replace(regex, `<span class="hl-overlay" onclick="openShadowModal(${idx})" style="text-decoration: underline; text-decoration-color: ${color}; text-underline-offset: 4px; cursor: pointer;">$1</span>`);
    });
    return html;
}
function openShadowModal(idx) {
    const item = portalData.shadowing.find(d => d.theme === currentTheme && d.lesson === currentSubKey);
    if (!item || !item.highlights[idx]) return;
    const hl = item.highlights[idx];
    const normalizedType = normalizeHighlightType(hl.type);
    const color = BOLD_COLORS[normalizedType] || 'var(--kepty-orange)';
    document.getElementById('modal-bar').style.background = color;
    const titleEl = document.getElementById('modal-title-text'); titleEl.style.color = color; titleEl.innerText = normalizedType;
    document.getElementById('modal-target').innerText = hl.target; document.getElementById('modal-desc').innerText = hl.explanation;
    document.getElementById('detail-modal').style.display = 'flex';
}

function runWelcomeOverlay() {
    const overlay = document.getElementById('welcome-overlay'), msgEl = document.getElementById('welcome-message');
    const hasSeenWelcome = sessionStorage.getItem('keptyWelcomeSeen') === '1';
    const welcomeTotalMs = 0;
    const fadeDurationMs = 0;
    const textRevealDelayMs = 0;
    if (hasSeenWelcome) {
        overlay.style.display = 'none';
        const menuTrigger = document.querySelector('.menu-pill-trigger');
        if (menuTrigger) menuTrigger.classList.add('ready');
        Promise.all([initialFetch, localExplainFetch, localGrammarFetch, localShadowingJapaneseFetch, localReadingModesFetch, localPronTranslationsFetch]).then(([data]) => {
            portalData = data;
            switchApp('vocabulary');
            lucide.createIcons();
        });
        return;
    }
    setTimeout(() => { msgEl.style.opacity = '1'; }, textRevealDelayMs);

    // Keep total intro duration at 2 seconds including fade-out animation.
    const minDisplayTime = new Promise(resolve => setTimeout(resolve, Math.max(0, welcomeTotalMs - fadeDurationMs)));
    
    Promise.all([initialFetch, localExplainFetch, localGrammarFetch, localShadowingJapaneseFetch, localReadingModesFetch, localPronTranslationsFetch, minDisplayTime]).then(([data]) => {
        portalData = data;
        overlay.style.opacity = '0'; 
        setTimeout(() => { 
            const menuTrigger = document.querySelector('.menu-pill-trigger');
            if (menuTrigger) menuTrigger.classList.add('ready');
            sessionStorage.setItem('keptyWelcomeSeen', '1');
            window.location.href = `dashboard.html?id=${encodeURIComponent(userId)}`;
        }, fadeDurationMs);
    });
}

let wakeLockSentinel = null;
async function requestWakeLock() {
    try {
        if (!('wakeLock' in navigator) || document.visibilityState !== 'visible') return;
        wakeLockSentinel = await navigator.wakeLock.request('screen');
        wakeLockSentinel.addEventListener('release', () => {
            wakeLockSentinel = null;
        });
    } catch (err) {
        console.warn('[WakeLock] unavailable:', err.message);
    }
}
document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') requestWakeLock();
});

window.onload = () => { 
    runWelcomeOverlay(); 
    requestWakeLock();
    lucide.createIcons();
    const f = document.getElementById('main-footer'); 
    f.addEventListener('scroll', () => { document.getElementById('footer-arrow').style.display = (f.scrollLeft + f.clientWidth >= f.scrollWidth - 10) ? 'none' : 'flex'; });
    const gp = document.getElementById('global-player');
    gp.onerror = () => console.error('[Audio] Audio element error. Code:', gp.error?.code, 'Src:', gp.src);
    console.log('[Init] Script loaded. AUDIO_SOURCE:', AUDIO_SOURCE, 'LOCAL_AUDIO_MAP:', LOCAL_AUDIO_MAP);
};
